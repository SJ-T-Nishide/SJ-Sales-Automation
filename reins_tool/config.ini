; ══════════════════════════════════════════════════════════════════════
;  reins_tool  設定ファイル  config.ini
;  ※ UTF-8 BOM なし で保存してください（メモ帳は「UTF-8」を選択）
; ══════════════════════════════════════════════════════════════════════

[paths]

; 引数なし起動時に reins_*.txt を探す入力フォルダ
; （AHK 自動モード時は不要。ファイルパスが引数で渡されます）
input_folder = C:\reins_tool\input

; TSV ファイル・エラーログの出力先フォルダ
output_folder = C:\reins_tool\output

; AHK ログファイルの出力先フォルダ
log_folder = C:\reins_tool\log


[options]

; 変換後に TSV をクリップボードにコピーするか（true / false）
copy_to_clipboard = true


[tabs]

; 条件番号（REINS の検索条件）→ スプレッドシートのタブ名 の対応表
; キー名は tab_01 ～ tab_20 の 2桁ゼロ埋め固定
; 値はスプレッドシートのシート名と完全一致させてください

tab_01 = 01 大阪_一戸建
tab_02 = 02 大阪市_マンション
tab_03 = 03 大阪市_外全
tab_04 = 04 大阪市_外一
tab_05 = 05 東京_外全
tab_06 = 06 東京_外一
tab_07 = 07 東京_一戸建
tab_08 = 08 東京_マンション
tab_09 = 09 福岡_マンション
tab_10 = 10 福岡_一戸建
tab_11 = 11 福岡_外全
tab_12 = 12 福岡_外一
tab_13 = 13 名古屋_外一
tab_14 = 14 名古屋_外全
tab_15 = 15 名古屋_マンション
tab_16 = 16 名古屋_一戸建
tab_17 = 17 札幌_一戸建
tab_18 = 18 札幌_マンション
tab_19 = 19 札幌_外全
tab_20 = 20 札幌_外一
